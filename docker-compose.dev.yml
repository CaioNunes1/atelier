services:
  postgres:
    image: postgres:16-alpine
    container_name: atelier-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: atelier
      POSTGRES_USER: atelier
      POSTGRES_PASSWORD: atelier_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: atelier-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_pass
    command: server /data --console-address ':9001'
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
